<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变：科技蓝绿 -->
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A192F;stop-opacity:1" />
    </linearGradient>
    
    <!-- 渐变：温暖橙粉 -->
    <linearGradient id="warmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB6C1;stop-opacity:1" />
    </linearGradient>
    
    <!-- 金属光泽 -->
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆环：水波纹效果 -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#techGradient)" stroke-width="3" opacity="0.3"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#techGradient)" stroke-width="2" opacity="0.2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#techGradient)" stroke-width="2" opacity="0.1"/>
  
  <!-- 神鹰展翅主体（抽象几何化） -->
  <g transform="translate(200, 200)">
    <!-- 左翼 -->
    <path d="M -80 20 L -120 -30 L -100 -50 L -60 -20 Z" 
          fill="url(#metalGradient)" 
          stroke="#00D4FF" 
          stroke-width="2"
          filter="url(#glow)"/>
    
    <!-- 右翼 -->
    <path d="M 80 20 L 120 -30 L 100 -50 L 60 -20 Z" 
          fill="url(#metalGradient)" 
          stroke="#00D4FF" 
          stroke-width="2"
          filter="url(#glow)"/>
    
    <!-- 身体（钻石切割） -->
    <path d="M 0 -60 L 30 -20 L 0 40 L -30 -20 Z" 
          fill="url(#techGradient)" 
          stroke="#BD34FE" 
          stroke-width="2"
          filter="url(#glow)"/>
    
    <!-- 头部 -->
    <circle cx="0" cy="-70" r="15" fill="url(#techGradient)" stroke="#00D4FF" stroke-width="2"/>
    
    <!-- 皇冠（简化三尖） -->
    <path d="M -10 -90 L -10 -100 L 0 -95 L 10 -100 L 10 -90" 
          fill="none" 
          stroke="#C9A959" 
          stroke-width="3"
          filter="url(#glow)"/>
  </g>
  
  <!-- 环绕水波纹 -->
  <ellipse cx="200" cy="220" rx="100" ry="20" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="200" cy="230" rx="80" ry="15" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  
  <!-- 装饰性电路纹理 -->
  <g opacity="0.3">
    <line x1="200" y1="40" x2="200" y2="80" stroke="#BD34FE" stroke-width="1"/>
    <line x1="200" y1="320" x2="200" y2="360" stroke="#BD34FE" stroke-width="1"/>
    <line x1="40" y1="200" x2="80" y2="200" stroke="#BD34FE" stroke-width="1"/>
    <line x1="320" y1="200" x2="360" y2="200" stroke="#BD34FE" stroke-width="1"/>
    
    <!-- 电路板节点 -->
    <circle cx="200" cy="40" r="4" fill="#00D4FF"/>
    <circle cx="200" cy="360" r="4" fill="#00D4FF"/>
    <circle cx="40" cy="200" r="4" fill="#00D4FF"/>
    <circle cx="360" cy="200" r="4" fill="#00D4FF"/>
  </g>
  
  <!-- 底部文字：猫猫の成长记录 -->
  <text x="200" y="340" 
        font-family="Arial, 'Microsoft YaHei', sans-serif" 
        font-size="18" 
        font-weight="bold"
        fill="url(#techGradient)"
        text-anchor="middle"
        letter-spacing="4">
    猫猫の成长记录
  </text>
  
  <!-- 英文副标题 -->
  <text x="200" y="365" 
        font-family="Arial, sans-serif" 
        font-size="10" 
        fill="#8B95A5"
        text-anchor="middle"
        letter-spacing="2">
    COLUMBIA GROWTH
  </text>
</svg>
